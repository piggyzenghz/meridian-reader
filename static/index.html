<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>Meridian · 子午线</title>
<!-- v1.6: body images eager (container-type breaks lazy); related cached &
     re-rendered; reader widened; TTS resume+cancel on close -->

<link rel="icon" type="image/png" href="/static/img/favicon.png">
<link rel="apple-touch-icon" href="/static/img/apple-touch.png">
<link rel="stylesheet" href="/static/style.css?v=__ASSETV__">
</head>
<body>

<!-- ════════ AUTH ════════ -->
<div id="auth" class="auth hidden" aria-hidden="true">
  <div class="auth-orbit" aria-hidden="true"></div>
  <div class="auth-grid" aria-hidden="true"></div>
  <div class="auth-card">
    <img class="auth-mark" src="/static/img/logo.png" alt="Meridian" width="64" height="64">
    <h1 class="auth-brand">Meridian</h1>
    <p class="auth-sub">子午线 · 全球财经 / 时政 / 科技 / AI 情报流</p>
    <form id="auth-form" autocomplete="off">
      <input id="auth-pin" type="password" inputmode="numeric" placeholder="访问密码" aria-label="访问密码" autofocus>
      <button type="submit">进入<span class="auth-arrow">→</span></button>
    </form>
    <p id="auth-error" class="auth-error" role="alert"></p>
  </div>
</div>

<!-- ════════ APP ════════ -->
<div id="app" class="app hidden">
  <aside id="sidebar" class="sidebar">
    <div class="masthead">
      <img class="masthead-mark" src="/static/img/logo.png" alt="Meridian" width="34" height="34">
      <div>
        <div class="masthead-name">Meridian</div>
        <div class="masthead-date" id="masthead-date"></div>
      </div>
    </div>
    <div class="sidebar-scroll">
      <nav class="nav" id="nav-cats" aria-label="分类"></nav>
      <div class="mon-head"><span>关键词监控</span>
        <button class="icon-btn sm" id="btn-add-monitor" title="监控一个话题/关键词"><svg><use href="#i-plus"/></svg></button>
      </div>
      <div class="nav-monitors" id="nav-monitors"></div>
      <div class="tags-head hidden" id="tags-head"><span>标签</span><span class="tags-sub">AI 自动归类</span></div>
      <div class="nav-tags" id="nav-tags"></div>
      <div class="feeds-head">
        <span>订阅源</span>
        <button class="icon-btn sm" id="btn-add-feed" title="添加订阅源"><svg><use href="#i-plus"/></svg></button>
      </div>
      <div class="nav-feeds" id="nav-feeds"></div>
    </div>
    <div class="sidebar-foot">
      <div class="usage" id="usage" title="今日 AI 用量">
        <div class="usage-bar"><i id="usage-fill"></i></div>
        <span id="usage-label">—</span>
      </div>
      <div class="foot-actions">
        <button class="icon-btn" id="btn-settings" title="设置 (,)"><svg><use href="#i-settings"/></svg></button>
        <button class="icon-btn" id="btn-theme" title="切换主题 (d)"><svg class="show-dark"><use href="#i-sun"/></svg><svg class="show-light"><use href="#i-moon"/></svg></button>
        <button class="icon-btn" id="btn-logout" title="退出登录"><svg><use href="#i-exit"/></svg></button>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="icon-btn only-mobile" id="btn-menu" title="菜单"><svg><use href="#i-menu"/></svg></button>
      <div class="topbar-heading">
        <h2 id="view-title">Today</h2>
        <span id="view-count" class="view-count"></span>
      </div>
      <div class="topbar-actions">
        <div class="seg" role="tablist" aria-label="过滤">
          <button data-filter="all" class="seg-btn active">全部</button>
          <button data-filter="unread" class="seg-btn">未读</button>
        </div>
        <button class="icon-btn" id="btn-search" title="搜索 (⌘K)"><svg><use href="#i-search"/></svg></button>
        <button class="icon-btn toggleable" id="btn-titles" title="标题中文对照 (t)"><svg><use href="#i-lang"/></svg></button>
        <button class="icon-btn toggleable" id="btn-group" title="同事件折叠 (g)"><svg><use href="#i-news"/></svg></button>
        <button class="icon-btn" id="btn-readall" title="全部标为已读"><svg><use href="#i-checkall"/></svg></button>
        <button class="icon-btn" id="btn-refresh" title="刷新 (r)"><svg><use href="#i-refresh"/></svg></button>
      </div>
    </header>

    <div class="ticker" id="ticker" aria-hidden="true">
      <div class="ticker-track" id="ticker-track"></div>
    </div>

    <div class="list-wrap" id="list-wrap">
      <div id="list" class="list"></div>
      <div id="list-sentinel"></div>
      <div id="list-end" class="list-end hidden">— 到底了 · End of stream —</div>
    </div>
  </main>

  <div class="scrim" id="scrim"></div>

  <article class="reader" id="reader" aria-label="阅读面板">
    <div class="reader-progress"><i id="reader-progress-fill"></i></div>
    <header class="reader-bar">
      <button class="icon-btn" id="btn-close-reader" title="关闭 (Esc)"><svg><use href="#i-back"/></svg></button>
      <div class="reader-nav">
        <button class="icon-btn sm" id="btn-prev" title="上一篇 (k)"><svg><use href="#i-chev-up"/></svg></button>
        <button class="icon-btn sm" id="btn-next" title="下一篇 (j)"><svg><use href="#i-chev-down"/></svg></button>
      </div>
      <div class="reader-bar-meta" id="reader-bar-meta"></div>
      <div class="reader-bar-actions">
        <button class="pill" id="btn-translate" title="中英对照 (b)"><svg><use href="#i-lang"/></svg><span>对照翻译</span></button>
        <button class="icon-btn" id="btn-listen" title="朗读 (p)"><svg><use href="#i-play"/></svg></button>
        <button class="icon-btn" id="btn-summary" title="AI 摘要"><svg><use href="#i-sparkle"/></svg></button>
        <button class="icon-btn" id="btn-rewrite" title="标题党?重写为中性标题"><svg><use href="#i-marker"/></svg></button>
        <button class="icon-btn" id="btn-type" title="字号 / 行距"><svg><use href="#i-type"/></svg></button>
        <button class="icon-btn" id="btn-later" title="稍后读 (l)"><svg><use href="#i-clock"/></svg></button>
        <button class="icon-btn" id="btn-star" title="收藏 (s)"><svg><use href="#i-star"/></svg></button>
        <button class="icon-btn" id="btn-fulltext" title="加载全文"><svg><use href="#i-doc"/></svg></button>
        <a class="icon-btn" id="btn-original" target="_blank" rel="noopener" title="打开原文"><svg><use href="#i-external"/></svg></a>
      </div>
      <div class="type-pop hidden" id="type-pop">
        <div class="type-row"><span>字号</span>
          <button data-type="font" data-d="-1">A−</button><span id="type-font">17</span><button data-type="font" data-d="1">A+</button></div>
        <div class="type-row"><span>行距</span>
          <button data-type="lh" data-d="-1">−</button><span id="type-lh">1.8</span><button data-type="lh" data-d="1">+</button></div>
        <div class="type-row"><span>宽度</span>
          <button data-type="width" data-d="-1">−</button><span id="type-width">标准</span><button data-type="width" data-d="1">+</button></div>
      </div>
      <div class="tts-bar hidden" id="tts-bar">
        <button class="icon-btn sm" id="tts-toggle" title="暂停/继续"><svg><use href="#i-pause"/></svg></button>
        <span id="tts-status">朗读中</span>
        <button class="tts-rate" data-rate="0.8">0.8×</button>
        <button class="tts-rate active" data-rate="1">1×</button>
        <button class="tts-rate" data-rate="1.3">1.3×</button>
        <button class="tts-rate" data-rate="1.6">1.6×</button>
        <button class="icon-btn sm" id="tts-stop" title="停止"><svg><use href="#i-close"/></svg></button>
      </div>
    </header>
    <div class="reader-scroll" id="reader-scroll">
      <div class="reader-inner" id="reader-inner"></div>
    </div>
  </article>
</div>

<!-- ════════ COMMAND PALETTE ════════ -->
<div class="palette hidden" id="palette">
  <div class="palette-box">
    <div class="palette-input-row">
      <svg class="palette-icon"><use href="#i-search"/></svg>
      <input id="palette-input" placeholder="搜索文章，或输入命令…" autocomplete="off">
      <kbd>esc</kbd>
    </div>
    <div class="palette-results" id="palette-results"></div>
  </div>
</div>

<!-- ════════ SETTINGS ════════ -->
<div class="modal hidden" id="settings">
  <div class="modal-box">
    <header class="modal-head">
      <h3>订阅源管理</h3>
      <button class="icon-btn" id="btn-close-settings"><svg><use href="#i-close"/></svg></button>
    </header>
    <form class="feed-add" id="feed-add-form">
      <input id="feed-add-url" type="url" placeholder="https://example.com/feed.xml 或任意网址" required>
      <select id="feed-add-cat"></select>
      <button type="submit" class="pill">添加</button>
    </form>
    <div class="mute-box">
      <div class="mute-head"><svg><use href="#i-mute"/></svg>静音关键词（命中的文章不再显示）</div>
      <form class="mute-add" id="mute-add-form">
        <input id="mute-add-input" placeholder="输入要屏蔽的词，如：彩票、某话题…" maxlength="80">
        <button type="submit" class="pill ghost">屏蔽</button>
      </form>
      <div class="mute-list" id="mute-list"></div>
    </div>
    <div class="engine-box">
      <div class="engine-head"><svg><use href="#i-sparkle"/></svg>AI 引擎（简报 / 摘要 / 翻译 各自可切）</div>
      <div class="engine-list" id="engine-list"></div>
    </div>
    <div class="opml-box">
      <div class="opml-head"><svg><use href="#i-doc"/></svg>订阅导入 / 导出（OPML）</div>
      <div class="opml-actions">
        <a class="pill ghost" id="btn-opml-export" href="/opml" download="meridian-feeds.opml">导出 OPML</a>
        <button class="pill ghost" id="btn-opml-import" type="button">导入 OPML</button>
      </div>
      <textarea id="opml-input" class="opml-input hidden" placeholder="粘贴 OPML 内容，再点一次「导入 OPML」…"></textarea>
    </div>
    <div class="feed-list" id="feed-list"></div>
  </div>
</div>

<div class="toast-stack" id="toasts" role="status" aria-live="polite" aria-atomic="false"></div>

<div class="hl-pop hidden" id="hl-pop">
  <button id="hl-translate"><svg><use href="#i-lang"/></svg>翻译</button>
  <button id="hl-save"><svg><use href="#i-marker"/></svg>高亮</button>
  <button id="hl-copy"><svg><use href="#i-copy"/></svg>复制</button>
</div>

<div class="hl-trans hidden" id="hl-trans">
  <div class="hl-trans-src" id="hl-trans-src"></div>
  <div class="hl-trans-zh" id="hl-trans-zh"></div>
  <div class="hl-trans-note" id="hl-trans-note"></div>
</div>

<script type="module" src="/static/app.js?v=__ASSETV__"></script>
</body>
</html>
